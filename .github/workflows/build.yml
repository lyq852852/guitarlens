name: Build GuitarLens

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build React app
        run: npm run build
        env:
          CI: false

      - name: Prepare app dir
        run: cp -r build app

      - name: Install electron-packager
        run: npm install --save-dev electron-packager

      - name: Package with electron-packager
        run: |
          npx electron-packager . GuitarLens \
            --platform=darwin \
            --arch=arm64 \
            --out=dist \
            --overwrite \
            --ignore="node_modules/(react|react-dom|react-scripts|electron-builder|concurrently|wait-on|tailwindcss|autoprefixer|postcss|eslint|prettier|@types|@playwright).*" \
            --ignore="build" \
            --ignore="src" \
            --ignore="public" \
            2>&1

      - name: Show dist
        if: always()
        run: ls -laR dist/ 2>/dev/null || echo "dist/ empty"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GuitarLens-mac
          path: dist/
          if-no-files-found: warn

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build React app
        run: npm run build
        env:
          CI: false

      - name: Prepare app dir
        shell: pwsh
        run: Copy-Item -Recurse build app

      - name: Install electron-packager
        run: npm install --save-dev electron-packager

      - name: Package with electron-packager
        run: |
          npx electron-packager . GuitarLens --platform=win32 --arch=x64 --out=dist --overwrite 2>&1

      - name: Show dist
        if: always()
        shell: pwsh
        run: if (Test-Path dist) { Get-ChildItem -Recurse dist | Select FullName } else { Write-Host "dist/ empty" }

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GuitarLens-windows
          path: dist/
          if-no-files-found: warn