name: Build GuitarLens

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build React app
        run: npm run build
        env:
          CI: false

      - name: Package macOS
        run: |
          npx electron-builder --mac --x64 2>&1 | tee build-log.txt || true
          echo "## Build Log" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat build-log.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          # 如果失败则退出
          if grep -q "Error" build-log.txt; then
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GuitarLens-mac
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: warn

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build React app
        run: npm run build
        env:
          CI: false

      - name: Package Windows
        run: |
          npx electron-builder --win --x64 2>&1 | tee build-log.txt || true
          echo "## Build Log" >> $env:GITHUB_STEP_SUMMARY
          echo "``````" >> $env:GITHUB_STEP_SUMMARY
          Get-Content build-log.txt >> $env:GITHUB_STEP_SUMMARY
          echo "``````" >> $env:GITHUB_STEP_SUMMARY
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GuitarLens-windows
          path: |
            dist/*.exe
            dist/*.zip
          if-no-files-found: warn
