name: Build GuitarLens

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build React app
        run: npm run build
        env:
          CI: false

      - name: Prepare app dir
        run: cp -r build app

      - name: List files for packaging
        run: |
          echo "=== app/ ==="
          ls app/
          echo "=== electron/ ==="
          ls electron/
          echo "=== package.json main ==="
          node -e "console.log(require('./package.json').main)"

      - name: Package macOS (inline config)
        run: |
          npx electron-builder \
            --mac \
            --dir \
            --config.appId=com.guitarlens.app \
            --config.productName=GuitarLens \
            --config.files="app/**/*,electron/**/*,python/**/*,package.json" \
            --config.asar=false \
            --config.mac.category=public.app-category.music \
            --config.directories.output=dist \
            2>&1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Show all output
        if: always()
        run: |
          echo "=== dist/ ==="
          find dist -maxdepth 3 -type f 2>/dev/null || echo "(empty)"
          echo "=== Any .app bundles ==="
          find . -maxdepth 3 -name "*.app" -type d 2>/dev/null || echo "(none)"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GuitarLens-mac
          path: dist/
          if-no-files-found: warn

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build React app
        run: npm run build
        env:
          CI: false

      - name: Prepare app dir
        shell: pwsh
        run: Copy-Item -Recurse build app

      - name: Package Windows (inline config)
        shell: bash
        run: |
          npx electron-builder \
            --win \
            --dir \
            --config.appId=com.guitarlens.app \
            --config.productName=GuitarLens \
            --config.files="app/**/*,electron/**/*,python/**/*,package.json" \
            --config.asar=false \
            --config.directories.output=dist \
            2>&1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Show all output
        if: always()
        shell: pwsh
        run: |
          if (Test-Path dist) { Get-ChildItem -Recurse dist | Select-Object FullName } else { Write-Host "(empty)" }

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GuitarLens-windows
          path: dist/
          if-no-files-found: warn
