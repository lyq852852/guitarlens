name: Build GuitarLens

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build React app
        run: npm run build
        env:
          CI: false

      - name: Prepare Electron app
        run: |
          echo "=== build/ contents ==="
          ls -la build/
          echo "=== Renaming build/ to app/ ==="
          cp -r build app
          echo "=== app/ contents ==="
          ls -la app/

      - name: Package macOS
        run: npx electron-builder --mac --x64 --config.electronBuilderConfig.asar=false 2>&1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Debug dist output
        if: always()
        run: |
          echo "=== dist/ contents ==="
          ls -laR dist/ 2>/dev/null || echo "dist/ not found"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GuitarLens-mac
          path: dist/
          if-no-files-found: warn

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build React app
        run: npm run build
        env:
          CI: false

      - name: Prepare Electron app
        shell: pwsh
        run: |
          Write-Host "=== build/ contents ==="
          dir build
          Write-Host "=== Copying build/ to app/ ==="
          Copy-Item -Recurse build app
          Write-Host "=== app/ contents ==="
          dir app

      - name: Package Windows
        run: npx electron-builder --win --x64 2>&1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Debug dist output
        if: always()
        shell: pwsh
        run: |
          Write-Host "=== dist/ contents ==="
          if (Test-Path dist) { dir -Recurse dist } else { Write-Host "dist/ not found" }

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GuitarLens-windows
          path: dist/
          if-no-files-found: warn
