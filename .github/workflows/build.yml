name: Build GuitarLens

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build React app
        run: npm run build
        env:
          CI: false

      - name: Prepare app dir
        run: cp -r build app

      - name: Show electron-builder version
        run: npx electron-builder --version

      - name: Package macOS (with full log)
        run: |
          npx electron-builder --mac dir --x64 2>&1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Show dist
        if: always()
        run: find dist -type f 2>/dev/null || echo "dist/ empty or missing"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GuitarLens-mac
          path: dist/
          if-no-files-found: warn

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build React app
        run: npm run build
        env:
          CI: false

      - name: Prepare app dir
        shell: pwsh
        run: Copy-Item -Recurse build app

      - name: Show electron-builder version
        run: npx electron-builder --version

      - name: Package Windows (with full log)
        run: npx electron-builder --win dir --x64 2>&1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Show dist
        if: always()
        shell: pwsh
        run: if (Test-Path dist) { Get-ChildItem -Recurse dist } else { Write-Host "dist/ empty or missing" }

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GuitarLens-windows
          path: dist/
          if-no-files-found: warn
