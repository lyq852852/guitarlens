name: Build GuitarLens

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build React app
        run: npm run build
        env:
          CI: false

      - name: Prepare app dir
        run: cp -r build app

      - name: Package macOS
        run: npx electron-builder --mac dir 2>&1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Show dist
        if: always()
        run: find . -path ./node_modules -prune -o -path ./.git -prune -o -type f -name "*.app" -print -o -type f -name "*.dmg" -print 2>/dev/null; echo "---"; ls -la dist/ 2>/dev/null || echo "dist/ missing"; ls -la build/unpacked/ 2>/dev/null || echo "build/unpacked/ missing"

      - name: Upload all build outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GuitarLens-mac-output
          path: |
            dist/
            build/unpacked/
          if-no-files-found: warn

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build React app
        run: npm run build
        env:
          CI: false

      - name: Prepare app dir
        shell: pwsh
        run: Copy-Item -Recurse build app

      - name: Package Windows
        run: npx electron-builder --win dir 2>&1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Show dist
        if: always()
        shell: pwsh
        run: if (Test-Path dist) { Get-ChildItem -Recurse dist -Name } else { Write-Host "dist/ missing" }

      - name: Upload all build outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GuitarLens-win-output
          path: |
            dist/
            build/unpacked/
          if-no-files-found: warn
